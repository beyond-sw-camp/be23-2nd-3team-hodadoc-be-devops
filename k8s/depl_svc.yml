apiVersion: apps/v1
kind: Deployment
metadata:
  name: hodadoc-deployment
  namespace: hodadoc
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-hodadoc
  template:
    metadata:
      labels:
        app: my-hodadoc
    spec:
      containers:
      - name: my-hodadoc
        image: 346903264902.dkr.ecr.ap-northeast-2.amazonaws.com/hodadoc
        ports:
        - containerPort: 8080
        resources:
        # м»Ён…Ңмқҙл„Ҳк°Җ мӮ¬мҡ©н• мҲҳ мһҲлҠ” лҰ¬мҶҢмҠӨмқҳ мөңлҢҖм№ҳ
          limits:
            cpu: "1"
            memory: "1Gi"
        # м»Ён…Ңмқҙл„Ҳк°Җ мӢңмһ‘лҗ л•Ң ліҙмһҘл°ӣм•„м•ј н•ҳлҠ” мөңмҶҢ мһҗмӣҗ
          requests:
            cpu: "0.5"
            memory: "512Mi"
        env:
         - name: JAVA_OPTS
           value: "-Xms256m -Xmx768m"
        env:
        # м•„лһҳмқҳ nameкіј ymlмқҳ ${}мқҳ ліҖмҲҳлӘ…кіј мқјм№ҳн•ҙм•јн•Ё
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: hodadoc-secrets
              key: DB_HOST
        - name: DB_PW
          valueFrom:
            secretKeyRef:
              name: hodadoc-secrets
              key: DB_PW
        - name: RABBITMQ_DEFAULT_USER
          valueFrom:
            secretKeyRef:
              name: hodadoc-secrets
              key: RABBITMQ_DEFAULT_USER
        - name: RABBITMQ_DEFAULT_PASS
          valueFrom:
            secretKeyRef:
              name: hodadoc-secrets
              key: RABBITMQ_DEFAULT_PASS                  
        - name: JWT_SECRETKEY
          valueFrom:
            secretKeyRef:
              name: hodadoc-secrets
              key: JWT_SECRETKEY 
        - name: JWT_SECRETKEY_RT
          valueFrom:
            secretKeyRef:
              name: hodadoc-secrets
              key: JWT_SECRETKEY_RT
        - name: KAKAO_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: hodadoc-secrets
              key: KAKAO_CLIENT_ID
        - name: KAKAO_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: hodadoc-secrets
              key: KAKAO_CLIENT_SECRET
        - name: FRONT_DOMAIN
          valueFrom:
            secretKeyRef:
              name: hodadoc-secrets
              key: FRONT_DOMAIN
        - name: AWS_ACCESS_KEY_HOS
          valueFrom:
            secretKeyRef:
              name: hodadoc-secrets
              key: AWS_ACCESS_KEY_HOS
        - name: AWS_SECRET_KEY_HOS
          valueFrom:
            secretKeyRef:
              name: hodadoc-secrets
              key: AWS_SECRET_KEY_HOS
        - name: HOLIDAY_SERVICE_KEY
          valueFrom:
            secretKeyRef:
              name: hodadoc-secrets
              key: HOLIDAY_SERVICE_KEY  
        - name: HOLIDAY_URL
          valueFrom:
            secretKeyRef:
              name: hodadoc-secrets
              key: HOLIDAY_URL
        - name: SOLAPI_API_KEY
          valueFrom:
            secretKeyRef:
              name: hodadoc-secrets
              key: SOLAPI_API_KEY 
        - name: SOLAPI_API_SECRET
          valueFrom:
            secretKeyRef:
              name: hodadoc-secrets
              key: SOLAPI_API_SECRET
        - name: PHONE_NUMBER
          valueFrom:
            secretKeyRef:
              name: hodadoc-secrets
              key: PHONE_NUMBER                                                                                                                                                                           
        # м»Ён…Ңмқҙл„Ҳ мғҒнғң нҷ•мқёмқ„ нҶөн•ҙ лЎӨл§Ғм—…лҚ°мқҙнҠё мөңм Ғнҷ” 
        readinessProbe:
          httpGet:
            # healthcheck кІҪлЎң
            path: /health
            port: 8080
          # м»Ён…Ңмқҙл„Ҳ мӢңмһ‘ нӣ„ м§Җм—°
          initialDelaySeconds: 90
          # нҷ•мқё л°ҳліө мЈјкё°
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: hodadoc-service
  namespace: hodadoc
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
  selector:
    app: my-hodadoc