spring:
  config:
    activate:
      on-profile: local
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://localhost:3306/hodadoc?useSSL=true
    username: root
    password: test1234

  sql:
    init:
      mode: never # 항상 실행 (필요에 따라 never, embedded 로 변경)
      data-locations: classpath:data.sql, classpath:hospital_data_all_final.sql, classpath:insert_doctor.sql, classpath:insert_hospital_holiday.sql, classpath:insert_hospital_images_s3.sql, classpath:update_coordinates_all.sql

  jpa:
    database: mysql
    database-platform: org.hibernate.dialect.MariaDBDialect
    generate-ddl: true
    hibernate:
      ddl-auto: update
    show_sql: true
    defer-datasource-initialization: true # JPA 테이블 생성 후 data.sql 실행하도록 보장

  servlet:
    multipart:
      enabled: true
      max-file-size: 1000MB
      max-request-size: 1000MB


  redis:
    host: localhost
    port: 6379

  jackson:
    serialization:
      write-dates-as-timestamps: false  # ✅ LocalDate를 타임스탬프 대신 "2026-02-24" 형식으로 직렬화
    deserialization:
      fail-on-unknown-properties: false  # ✅ 알 수 없는 필드 무시

server:
  port: 8080
  tomcat:
    max-file-part-count: 100
    max-parameter-count: 1000

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml

